name: Generate PDF

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit updated PDF to repo'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false  # Book images are regular git objects, not LFS

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Generate LaTeX from TSX
        run: cd web && npm run generate-latex

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-science \
            texlive-pictures \
            latexmk \
            ghostscript

      - name: Compile book PDF
        run: |
          cd book
          # First pass (generates .aux, .toc, etc.)
          latexmk -pdf -interaction=nonstopmode book.tex || true
          # Second pass with -f to force through non-fatal warnings (missing images, etc.)
          latexmk -pdf -interaction=nonstopmode -f book.tex || true
          # Third pass to resolve cross-references
          latexmk -pdf -interaction=nonstopmode -f book.tex || true
          # Verify PDF was actually produced
          if [ ! -f book.pdf ]; then
            echo "ERROR: book.pdf was not produced"
            exit 1
          fi
          echo "SUCCESS: book.pdf produced ($(du -h book.pdf | cut -f1))"

      - name: Copy PDF to web
        run: cp book/book.pdf web/public/book.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: book/book.pdf

      - name: Commit PDF
        if: ${{ inputs.commit }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/book.pdf
          git diff --cached --quiet || git commit -m "Update book.pdf [skip ci]"
          git push
